<div class="app-shell">
  <aside class="sidebar">
    <div class="sidebar-brand">
      <div class="brand-icon">
        <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
          <circle cx="14" cy="14" r="13" stroke="currentColor" stroke-width="1.5" opacity="0.3" />
          <circle cx="14" cy="14" r="8" stroke="currentColor" stroke-width="1.5" opacity="0.5" />
          <circle cx="14" cy="14" r="3" fill="currentColor" />
          <circle cx="14" cy="3" r="1.5" fill="currentColor" opacity="0.6" />
          <circle cx="14" cy="25" r="1.5" fill="currentColor" opacity="0.6" />
          <circle cx="3" cy="14" r="1.5" fill="currentColor" opacity="0.6" />
          <circle cx="25" cy="14" r="1.5" fill="currentColor" opacity="0.6" />
        </svg>
      </div>
      <span class="brand-text">NetPulse</span>
    </div>

    <nav class="sidebar-nav">
      <a
        class="nav-item"
        routerLink="/dashboard"
        routerLinkActive="active"
        [routerLinkActiveOptions]="{ exact: true }"
      >
        <span class="material-icons nav-icon">dashboard</span>
        <span class="nav-label">Dashboard</span>
      </a>
      <a class="nav-item" routerLink="/devices" routerLinkActive="active">
        <span class="material-icons nav-icon">devices</span>
        <span class="nav-label">Devices</span>
      </a>
      <a class="nav-item" routerLink="/bandwidth" routerLinkActive="active">
        <span class="material-icons nav-icon">speed</span>
        <span class="nav-label">Bandwidth</span>
      </a>
      <a class="nav-item" routerLink="/settings" routerLinkActive="active">
        <span class="material-icons nav-icon">tune</span>
        <span class="nav-label">Settings</span>
      </a>
    </nav>

    <div class="sidebar-footer">
      <div class="sidebar-version">v1.0.0</div>
    </div>
  </aside>

  <main class="main-content">
    <router-outlet />
  </main>
</div>
