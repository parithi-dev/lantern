name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend:
    name: Frontend (Angular)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - run: npm ci
      - run: npx ng build --configuration production

  agent:
    name: Python Agent
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agent

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: agent/requirements.txt

      - run: pip install -r requirements.txt
      - run: |
          python -c "from agent.main import app; print('ok')"

  agent-win:
    name: Python Agent (Windows)
    runs-on: windows-latest
    defaults:
      run:
        working-directory: agent

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: agent/requirements.txt

      - run: pip install -r requirements.txt
      - run: python -c "from agent.main import app; print('FastAPI app loaded: ' + app.title)"

  lint:
    name: Format Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci
      - run: npx prettier --check "src/app/**/*.{ts,html,scss}"
